<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Mini Hollow Knight — Fase 1</title>
<style>
  /* ---------------------------
     Estilos generales y canvas
     --------------------------- */
  :root{
    --bg-1:#0b0f17; /* very dark */
    --bg-2:#0f1724; /* slightly lighter */
    --accent:#9fb8ff; /* cool accent */
    --soft:#6b7280;
    --glow: rgba(159,184,255,0.12);
  }
  html,body{
    height:100%;
    margin:0;
    background: radial-gradient(1200px 600px at 10% 10%, #071022 0%, transparent 10%),
                linear-gradient(180deg,var(--bg-1),var(--bg-2));
    color:#ddd;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .wrap{
    width: 100%;
    max-width: 1100px;
    height: 640px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.02), transparent 30%);
  }
  canvas{
    display:block;
    width:100%;
    height:100%;
    background: transparent;
    image-rendering: optimizeSpeed;
  }
  /* Minimal UI hint */
  .hint{
    position:absolute;
    left:14px;
    bottom:10px;
    color:rgba(200,210,255,0.7);
    font-size:13px;
    letter-spacing:0.4px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }
</style>
</head>
<body>
  <div class="wrap">
    <canvas id="game"></canvas>
    <div class="hint">A / ←  D / → : mover · W / ↑ / Espacio : saltar · J : atacar (no activo en Fase 1)</div>
  </div>

<script>
/* ============================================================
   Mini Hollow Knight — FASE 1
   - Un solo archivo HTML
   - Canvas rendering
   - Game loop con requestAnimationFrame
   - Jugador con movimiento fluido y salto
   - Colisión con suelo
   - Cámara suave que sigue al jugador
   ------------------------------------------------------------
   Secciones: INPUT, PLAYER, PHYSICS, RENDER, CAMERA, ENEMIES, UI
   ============================================================ */

/* ============================
   CONFIGURACIÓN Y UTILIDADES
   ============================ */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d', { alpha: true });

let DPR = Math.min(window.devicePixelRatio || 1, 2);
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const rect = canvas.getBoundingClientRect();
  canvas.width = Math.floor(rect.width * DPR);
  canvas.height = Math.floor(rect.height * DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
resize();

/* -------------------------
   Paleta y utilidades color
   ------------------------- */
const palette = {
  bg1: '#0b0f17',
  bg2: '#0f1724',
  mid: '#1b2430',
  accent: '#9fb8ff',
  soft: '#6b7280',
  light: '#e6eefc',
  glow: 'rgba(159,184,255,0.12)'
};

function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function lerp(a,b,t){ return a + (b-a)*t; }

/* ============================
   INPUT
   ============================ */
const input = {
  left:false, right:false, up:false, attack:false
};

window.addEventListener('keydown', (e)=>{
  if(e.key === 'a' || e.key === 'ArrowLeft') input.left = true;
  if(e.key === 'd' || e.key === 'ArrowRight') input.right = true;
  if(e.key === 'w' || e.key === 'ArrowUp' || e.key === ' ') input.up = true;
  if(e.key === 'j') input.attack = true;
});
window.addEventListener('keyup', (e)=>{
  if(e.key === 'a' || e.key === 'ArrowLeft') input.left = false;
  if(e.key === 'd' || e.key === 'ArrowRight') input.right = false;
  if(e.key === 'w' || e.key === 'ArrowUp' || e.key === ' ') input.up = false;
  if(e.key === 'j') input.attack = false;
});

/* ============================
   WORLD / TILEMAP (simple)
   ============================ */
/* Ground is a set of rectangles. For Fase 1 we create a long floor and a few ledges. */
const world = {
  gravity: 2200, // px/s^2
  tiles: []
};

function createLevel(){
  world.tiles = [];
  // ground
  world.tiles.push({x:-2000, y:420, w:4000, h:220});
  // platforms
  world.tiles.push({x:120, y:340, w:160, h:18});
  world.tiles.push({x:360, y:280, w:120, h:18});
  world.tiles.push({x:640, y:320, w:200, h:18});
  world.tiles.push({x:980, y:260, w:140, h:18});
  world.tiles.push({x:1300, y:340, w:220, h:18});
}
createLevel();

/* ============================
   PLAYER
   ============================ */
/* Player state and drawing.
   We'll draw a stylized bug-like silhouette using canvas shapes.
*/
const player = {
  x: 100,
  y: 300,
  w: 28,
  h: 36,
  vx: 0,
  vy: 0,
  facing: 1, // 1 right, -1 left
  onGround: false,
  // movement tuning for good "game feel"
  speed: 420,          // max horizontal speed px/s
  accel: 3600,         // acceleration px/s^2
  friction: 2200,      // ground friction px/s^2
  airAccel: 1800,      // air control
  jumpSpeed: 640,      // initial jump velocity
  coyoteTime: 0.12,    // seconds after leaving ground where jump still allowed
  coyoteTimer: 0,
  jumpBufferTime: 0.12,
  jumpBufferTimer: 0,
  // animation
  anim: {
    t:0,
    state:'idle' // idle, walk, jump, fall
  }
};

/* ============================
   PHYSICS
   ============================ */
/* Simple AABB collision resolution with static rectangles.
   We'll perform movement in two steps (x then y) to avoid tunneling.
*/
function physicsStep(dt){
  // input -> horizontal acceleration
  let target = 0;
  if(input.left) target -= 1;
  if(input.right) target += 1;
  if(target !== 0) player.facing = target;

  const accel = player.onGround ? player.accel : player.airAccel;
  // accelerate towards target velocity
  const desiredVx = target * player.speed;
  if(Math.abs(desiredVx - player.vx) < 1){
    player.vx = desiredVx;
  } else {
    const sign = Math.sign(desiredVx - player.vx);
    player.vx += sign * accel * dt;
    // clamp to max speed
    if(Math.abs(player.vx) > player.speed) player.vx = player.facing * player.speed;
  }

  // friction when no input and on ground
  if(target === 0 && player.onGround){
    const sign = Math.sign(player.vx);
    player.vx -= sign * player.friction * dt;
    if(Math.sign(player.vx) !== sign) player.vx = 0;
  }

  // gravity
  player.vy += world.gravity * dt;

  // jump buffering and coyote time
  if(input.up){
    player.jumpBufferTimer = player.jumpBufferTime;
  } else {
    player.jumpBufferTimer -= dt;
  }
  player.coyoteTimer -= dt;

  // attempt jump if buffered and allowed
  if(player.jumpBufferTimer > 0 && player.coyoteTimer > -0.01){
    // perform jump
    player.vy = -player.jumpSpeed;
    player.onGround = false;
    player.coyoteTimer = -1;
    player.jumpBufferTimer = 0;
  }

  // integrate X
  player.x += player.vx * dt;
  resolveCollisions('x');

  // integrate Y
  player.y += player.vy * dt;
  player.onGround = false;
  resolveCollisions('y');

  // update animation state
  updateAnimation(dt);
}

/* Collision resolution */
function resolveCollisions(axis){
  const px = player.x, py = player.y, pw = player.w, ph = player.h;
  for(const t of world.tiles){
    if(px < t.x + t.w && px + pw > t.x && py < t.y + t.h && py + ph > t.y){
      // collision detected
      if(axis === 'x'){
        // push out horizontally
        if(player.vx > 0){
          player.x = t.x - pw - 0.001;
        } else if(player.vx < 0){
          player.x = t.x + t.w + 0.001;
        }
        player.vx = 0;
      } else if(axis === 'y'){
        if(player.vy > 0){
          // falling -> landed on top
          player.y = t.y - ph - 0.001;
          player.vy = 0;
          player.onGround = true;
          player.coyoteTimer = player.coyoteTime;
        } else if(player.vy < 0){
          // hit head
          player.y = t.y + t.h + 0.001;
          player.vy = 0;
        }
      }
    }
  }
}

/* ============================
   ANIMATION / GAME FEEL
   ============================ */
function updateAnimation(dt){
  player.anim.t += dt;
  if(!player.onGround){
    player.anim.state = player.vy < 0 ? 'jump' : 'fall';
  } else {
    if(Math.abs(player.vx) > 40){
      player.anim.state = 'walk';
    } else {
      player.anim.state = 'idle';
    }
  }
}

/* ============================
   CAMERA
   ============================ */
/* Smooth camera that follows player with lookahead */
const camera = {
  x: 0,
  y: 0,
  w: canvas.width / DPR,
  h: canvas.height / DPR,
  smooth: 0.12,
  lookahead: 80
};

function updateCamera(dt){
  camera.w = canvas.width / DPR;
  camera.h = canvas.height / DPR;
  // desired center
  const targetX = player.x + player.w/2 + player.facing * camera.lookahead;
  const targetY = player.y + player.h/2 - 40; // slightly above center
  // lerp camera center
  camera.x = lerp(camera.x, targetX - camera.w/2, 1 - Math.pow(1 - camera.smooth, dt*60));
  camera.y = lerp(camera.y, targetY - camera.h/2, 1 - Math.pow(1 - camera.smooth, dt*60));
}

/* ============================
   RENDER
   ============================ */
function clear(){
  // subtle vignette + gradient background
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // background gradient
  const g = ctx.createLinearGradient(0,0,0,camera.h);
  g.addColorStop(0, palette.bg2);
  g.addColorStop(1, palette.bg1);
  ctx.fillStyle = g;
  ctx.fillRect(0,0,camera.w,camera.h);

  // soft fog layer
  ctx.fillStyle = palette.glow;
  ctx.fillRect(0,0,camera.w,camera.h);
}

/* Parallax background */
function drawBackground(){
  // distant shapes to give depth
  const cx = camera.x * 0.2;
  const cy = camera.y * 0.05;
  ctx.save();
  ctx.translate(-cx % 800, -cy % 400);
  for(let i=-1;i<3;i++){
    ctx.fillStyle = 'rgba(20,28,40,0.35)';
    roundRect(ctx, i*400 + 40, 40, 320, 160, 40);
    ctx.fill();
    ctx.fillStyle = 'rgba(30,40,60,0.18)';
    roundRect(ctx, i*400 + 80, 120, 240, 120, 30);
    ctx.fill();
  }
  ctx.restore();
}

/* Draw world tiles (platforms) */
function drawWorld(){
  ctx.save();
  ctx.fillStyle = '#0f1724';
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for(const t of world.tiles){
    const sx = t.x - camera.x;
    const sy = t.y - camera.y;
    // platform base
    ctx.fillStyle = '#111827';
    roundRect(ctx, sx, sy, t.w, t.h, 6);
    ctx.fill();
    // top highlight
    const grad = ctx.createLinearGradient(sx, sy, sx, sy + t.h);
    grad.addColorStop(0, 'rgba(255,255,255,0.02)');
    grad.addColorStop(1, 'rgba(0,0,0,0.2)');
    ctx.fillStyle = grad;
    roundRect(ctx, sx, sy, t.w, t.h/2, 6);
    ctx.fill();
  }
  ctx.restore();
}

/* Draw player with simple animations and glow */
function drawPlayer(){
  const sx = player.x - camera.x;
  const sy = player.y - camera.y;
  ctx.save();
  ctx.translate(sx + player.w/2, sy + player.h/2);

  // subtle bob for idle
  let bob = 0;
  if(player.anim.state === 'idle'){
    bob = Math.sin(player.anim.t * 3) * 2;
  } else if(player.anim.state === 'walk'){
    bob = Math.sin(player.anim.t * 18) * 3;
  }

  ctx.translate(0, bob);

  // body glow
  ctx.shadowColor = palette.accent;
  ctx.shadowBlur = 18;
  ctx.fillStyle = '#eaf2ff';
  // body ellipse
  ctx.beginPath();
  ctx.ellipse(0, -2, 12, 14, 0, 0, Math.PI*2);
  ctx.fill();

  // mask (darker face)
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#0b1220';
  ctx.beginPath();
  ctx.ellipse(0, -4, 8, 9, 0, 0, Math.PI*2);
  ctx.fill();

  // horn / antenna
  ctx.strokeStyle = '#eaf2ff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-6, -12);
  ctx.quadraticCurveTo(-10, -20, -6, -28);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(6, -12);
  ctx.quadraticCurveTo(10, -20, 6, -28);
  ctx.stroke();

  // legs (simple)
  ctx.strokeStyle = '#0b1220';
  ctx.lineWidth = 2.5;
  const walkPhase = Math.sin(player.anim.t * 18) * (player.anim.state === 'walk' ? 1 : 0.2);
  ctx.beginPath();
  ctx.moveTo(-8, 8);
  ctx.lineTo(-8 + walkPhase*2, 14);
  ctx.moveTo(8, 8);
  ctx.lineTo(8 - walkPhase*2, 14);
  ctx.stroke();

  ctx.restore();
}

/* Helper: rounded rect */
function roundRect(ctx,x,y,w,h,r){
  const radius = r || 6;
  ctx.beginPath();
  ctx.moveTo(x+radius,y);
  ctx.arcTo(x+w,y,x+w,y+h,radius);
  ctx.arcTo(x+w,y+h,x,y+h,radius);
  ctx.arcTo(x,y+h,x,y,radius);
  ctx.arcTo(x,y,x+w,y,radius);
  ctx.closePath();
}

/* Main render */
function render(){
  clear();
  drawBackground();
  drawWorld();
  drawPlayer();
  // debug: draw camera bounds (optional)
  // ctx.strokeStyle = 'rgba(255,0,0,0.1)'; ctx.strokeRect(0,0,camera.w,camera.h);
}

/* ============================
   ENEMIES (placeholder)
   ============================ */
/* Fase 1 no incluye enemigos, pero dejamos la sección para futuras fases */
const enemies = [];

/* ============================
   UI (placeholder)
   ============================ */
/* Minimal UI will be added in fases posteriores */
function drawUI(){
  // nothing for phase 1
}

/* ============================
   GAME LOOP
   ============================ */
let last = performance.now();
function loop(now){
  const dt = Math.min((now - last) / 1000, 1/15); // clamp dt
  last = now;

  physicsStep(dt);
  updateCamera(dt);
  render();
  drawUI();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ============================
   INITIALIZATION TWEAKS
   ============================ */
/* Place player on first platform top */
(function placePlayer(){
  // find highest tile near start
  const startTile = world.tiles[0];
  player.x = 80;
  player.y = startTile.y - player.h - 0.1;
})();

/* ============================
   POLISH: small helpers for feel
   ============================ */
/* Allow small jump cut when releasing jump early */
window.addEventListener('keyup', (e)=>{
  if(e.key === 'w' || e.key === 'ArrowUp' || e.key === ' '){
    if(player.vy < 0){
      player.vy *= 0.55; // cut jump for variable height
    }
  }
});

/* Prevent accidental text selection while playing */
window.addEventListener('mousedown', (e)=>{ e.preventDefault(); });

/* End of Fase 1 code */
</script>
</body>
</html>
