<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Hollow Knight - Fase 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050508;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    canvas {
      border: 1px solid #151825;
      box-shadow: 0 0 40px rgba(60, 90, 150, 0.25);
      background: #0a0b12;
      image-rendering: auto;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="450"></canvas>

  <script>
    /* =========================================
       ⚙️ CONFIGURACIÓN GLOBAL
       ========================================= */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const GRAVITY = 0.55;
    const JUMP_FORCE = -11.8;
    const GROUND_ACCEL = 0.9;
    const AIR_ACCEL = 0.5;
    const MAX_SPEED = 5.2;
    const FRICTION = 0.84;
    const COYOTE_TIME = 7;
    const JUMP_BUFFER = 8;
    const WORLD_WIDTH = 1600;

    /* =========================================
       ⌨️ INPUT
       ========================================= */
    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    /* =========================================
       🌍 MUNDO & PLATAFORMAS
       ========================================= */
    // type: 'solid' (colisión completa) | 'oneway' (solo desde arriba)
    const platforms = [
      { x: 0, y: 380, w: 450, h: 40, type: 'solid' },
      { x: 550, y: 320, w: 180, h: 20, type: 'oneway' },
      { x: 850, y: 260, w: 120, h: 20, type: 'oneway' },
      { x: 1050, y: 380, w: 550, h: 40, type: 'solid' },
      { x: 1200, y: 220, w: 100, h: 15, type: 'oneway' },
      { x: 1400, y: 150, w: 200, h: 20, type: 'solid' },
      { x: 300, y: 240, w: 90, h: 15, type: 'oneway' },
      { x: 50, y: 180, w: 140, h: 20, type: 'oneway' }
    ];

    /* =========================================
       👤 PLAYER (Con Animaciones)
       ========================================= */
    const player = {
      x: 100, y: 300, w: 22, h: 30,
      vx: 0, vy: 0,
      grounded: false,
      facing: 1,
      coyoteTimer: 0,
      jumpBufferTimer: 0,
      // Animación & Estado
      breathOffset: 0,
      walkCycle: 0,
      lean: 0,
      stretchY: 0,
      cape: [],
      lastGroundTime: 0
    };

    /* =========================================
       📷 CAMERA (Lookahead & Bounds)
       ========================================= */
    const camera = { x: 0, y: 0 };
    const camSettings = { lerp: 0.06, lookahead: 60, minY: -50, maxY: 150 };

    /* =========================================
       🌌 PARTÍCULAS & AMBIENTE
       ========================================= */
    const particles = [];
    const ambientDust = [];
    
    // Inicializar polvo ambiental
    for(let i=0; i<25; i++) ambientDust.push({
      x: Math.random()*WORLD_WIDTH, y: Math.random()*canvas.height,
      size: Math.random()*1.5 + 0.5, speed: Math.random()*0.3 + 0.1, alpha: Math.random()*0.4 + 0.1
    });

    function spawnDust(x, y, count, color, speed=2) {
      for(let i=0; i<count; i++) {
        particles.push({
          x, y, vx: (Math.random()-0.5)*speed*1.5, vy: (Math.random()-0.8)*speed,
          life: 20+Math.random()*15, maxLife: 35, size: 1+Math.random()*2.5, color
        });
      }
    }

    /* =========================================
       ⚙️ PHYSICS & ACTUALIZACIÓN
       ========================================= */
    function update() {
      // Coyote & Buffer
      if (player.grounded) { player.coyoteTimer = COYOTE_TIME; player.lastGroundTime = Date.now(); }
      else player.coyoteTimer--;
      
      if (keys['Space'] || keys['KeyW']) player.jumpBufferTimer = JUMP_BUFFER;
      else player.jumpBufferTimer--;

      // Salto
      if (player.jumpBufferTimer > 0 && player.coyoteTimer > 0) {
        player.vy = JUMP_FORCE;
        player.grounded = false;
        player.coyoteTimer = 0; player.jumpBufferTimer = 0;
        player.stretchY = -0.4;
        spawnDust(player.x + player.w/2, player.y + player.h, 6, '#8899cc', 1.2);
      }

      // Variable jump height
      if (!(keys['Space'] || keys['KeyW']) && player.vy < -3) player.vy *= 0.72;

      // Movimiento
      let accel = player.grounded ? GROUND_ACCEL : AIR_ACCEL;
      let moving = false;
      if (keys['ArrowRight'] || keys['KeyD']) { player.vx += accel; player.facing = 1; moving = true; }
      else if (keys['ArrowLeft'] || keys['KeyA']) { player.vx -= accel; player.facing = -1; moving = true; }
      else { player.vx *= FRICTION; moving = false; }
      player.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, player.vx));

      // Animaciones
      player.walkCycle = moving ? player.walkCycle + 0.15 : player.walkCycle * 0.85;
      player.lean = player.vx * 0.045;
      player.stretchY *= 0.9; // Recuperación elástica
      player.breathOffset = Math.sin(Date.now() * 0.003) * 1.2;

      // Partículas al correr
      if (moving && player.grounded && Math.random() > 0.85) {
        spawnDust(player.x + player.w/2 - (player.facing*8), player.y + player.h, 1, '#6677aa', 0.6);
      }

      // Gravedad
      player.vy += GRAVITY;

      // Colisiones X
      player.x += player.vx;
      resolveCollisions('x');

      // Colisiones Y
      player.grounded = false;
      player.y += player.vy;
      resolveCollisions('y');

      // Aterrizaje
      if (player.grounded && player.vy > 4) {
        player.stretchY = 0.35;
        spawnDust(player.x + player.w/2, player.y + player.h, 10, '#aabbdd', 2);
      }

      // Capa (Cape)
      player.cape.unshift({ x: player.x + player.w/2, y: player.y + player.h/3, a: 0.6 });
      if (player.cape.length > 14) player.cape.pop();
      for (let i=0; i<player.cape.length; i++) player.cape[i].y += 0.8 + (i*0.15);

      // Polvo ambiental
      ambientDust.forEach(p => {
        p.x -= p.speed;
        p.y += Math.sin(Date.now()*0.001 + p.x)*0.2;
        if (p.x < camera.x - 50) p.x = camera.x + canvas.width + 20;
      });

      // Cámara
      let targetX = player.x + player.w/2 - canvas.width/2 + (player.facing * camSettings.lookahead);
      let targetY = player.y + player.h/2 - canvas.height/2 + camSettings.maxY;
      camera.x += (targetX - camera.x) * camSettings.lerp;
      camera.y += (targetY - camera.y) * camSettings.lerp * 0.6; // Más estable en Y
      
      // Límites del mundo
      camera.x = Math.max(0, Math.min(camera.x, WORLD_WIDTH - canvas.width));
      camera.y = Math.max(camSettings.minY, Math.min(camera.y, camSettings.maxY));
    }

    function resolveCollisions(axis) {
      for (let p of platforms) {
        if (axis === 'x') {
          if (player.x < p.x + p.w && player.x + player.w > p.x &&
              player.y + player.h > p.y + 4 && player.y < p.y + p.h - 4) {
            if (player.vx > 0) player.x = p.x - player.w;
            else player.x = p.x + p.w;
            player.vx = 0;
          }
        } else {
          if (player.x + player.w > p.x + 2 && player.x < p.x + p.w - 2) {
            if (p.type === 'oneway') {
              // Solo colisiona si cae desde arriba y está por encima del borde superior
              if (player.vy >= 0 && player.y + player.h - player.vy <= p.y + 2) {
                player.y = p.y - player.h;
                player.grounded = true;
                player.vy = 0;
              }
            } else if (player.y < p.y + p.h && player.y + player.h > p.y) {
              if (player.vy > 0) {
                player.y = p.y - player.h;
                player.grounded = true;
                player.vy = 0;
              } else {
                player.y = p.y + p.h;
                player.vy = 0;
              }
            }
          }
        }
      }
    }

    /* =========================================
       🖼️ RENDER (Mundo, Luz, Animaciones)
       ========================================= */
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // 1. FONDO PROFUNDO (Parallax Capa 1)
      drawBackgroundLayer(0.15, '#0d0f16', 0.4);
      
      ctx.save();
      ctx.translate(-camera.x, -camera.y);

      // 2. PLATAFORMAS (Parallax Capa 2 / Juego)
      ctx.shadowColor = '#2a3555';
      ctx.shadowBlur = 8;
      for (let p of platforms) {
        let baseColor = p.type === 'solid' ? '#161924' : '#1c2030';
        let edgeColor = p.type === 'solid' ? '#232838' : '#2a3045';
        
        ctx.fillStyle = baseColor;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        
        ctx.shadowBlur = 0;
        ctx.fillStyle = edgeColor;
        ctx.fillRect(p.x, p.y, p.w, 3); // Borde superior iluminado
        ctx.fillStyle = '#11131c';
        ctx.fillRect(p.x, p.y+3, p.w, p.h-3);
        
        // Detalles de textura simple
        ctx.fillStyle = 'rgba(40,50,70,0.3)';
        for(let i=10; i<p.w; i+=25) ctx.fillRect(p.x+i, p.y+4, 1, p.h-8);
      }

      // 3. POLVO AMBIENTAL
      ctx.fillStyle = '#556688';
      for (let d of ambientDust) {
        ctx.globalAlpha = d.alpha;
        ctx.beginPath(); ctx.arc(d.x, d.y, d.size, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;

      // 4. JUGADOR
      drawPlayer();

      // 5. PARTÍCULAS ACTIVAS
      for (let i=particles.length-1; i>=0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.05; p.life--;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        let a = p.life / p.maxLife;
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color; ctx.shadowBlur = 4;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size * a, 0, Math.PI*2); ctx.fill();
      }
      ctx.shadowBlur = 0; ctx.globalAlpha = 1;

      ctx.restore();

      // 6. CAPAS FOREGROUD / ATMÓSFERA (Parallax Capa 3)
      drawForegroundVignette();
      
      // UI Minimalista
      drawUI();
    }

    function drawBackgroundLayer(parallaxFactor, color, opacity) {
      ctx.fillStyle = color;
      ctx.globalAlpha = opacity;
      let offX = -camera.x * parallaxFactor;
      // Formas cavernarias simples
      for(let i=0; i<8; i++) {
        let bx = offX + (i * 220);
        let by = canvas.height - 100 - (Math.sin(i*1.5)*40);
        ctx.beginPath();
        ctx.moveTo(bx, canvas.height);
        ctx.quadraticCurveTo(bx+80, by-60, bx+160, canvas.height);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawPlayer() {
      let px = player.x, py = player.y;
      let breath = player.breathOffset;
      let lean = player.lean;
      let stretch = player.stretchY;
      
      let w = player.w, h = player.h + breath;
      let ox = px - lean * 4;
      let oy = py - breath/2 + stretch * 5;
      
      // Sombra dinámica en el suelo
      if (player.grounded || player.vy > 2) {
        let shadowScale = Math.max(0.3, 1 - (player.y - platforms.find(p=>player.y+player.h>=p.y&&player.y+player.h<p.y+20)?.y||0)/150);
        ctx.globalAlpha = 0.4 * shadowScale;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.ellipse(px + w/2, platforms.find(p=>player.y+player.h>=p.y && player.y+player.h<p.y+30)?.y||400, w*1.2, 3, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Glow base
      ctx.shadowColor = '#88aadd';
      ctx.shadowBlur = 10 + Math.sin(Date.now()*0.004)*2;
      
      // Cuerpo principal
      ctx.fillStyle = '#dce4f5';
      ctx.save();
      ctx.translate(ox + w/2, oy + h/2);
      ctx.rotate(lean * 0.1);
      ctx.scale(1 - Math.abs(stretch)*0.2, 1 + stretch);
      
      // Forma capsular estilo Hollow Knight
      ctx.beginPath();
      ctx.roundRect(-w/2, -h/2, w, h, 6);
      ctx.fill();
      ctx.restore();

      ctx.shadowBlur = 0;

      // Ojos
      ctx.fillStyle = '#080a12';
      let eyeX = ox + (player.facing > 0 ? w-9 : 5);
      let eyeY = oy + 10 + (player.vy < -2 ? -1 : 0); // Mirada arriba al saltar
      ctx.fillRect(eyeX, eyeY, 6, 8);

      // Capa (Trail suave)
      ctx.strokeStyle = '#5a6a90';
      ctx.lineWidth = 3; ctx.lineCap = 'round';
      ctx.beginPath();
      for(let i=0; i<player.cape.length; i++) {
        let c = player.cape[i];
        let a = 0.5 - (i*0.035);
        ctx.globalAlpha = Math.max(0, a);
        if(i===0) ctx.moveTo(c.x - (player.facing*6), c.y);
        else ctx.lineTo(c.x - (player.facing*12) + Math.sin(Date.now()*0.01+i)*2, c.y);
      }
      ctx.stroke(); ctx.globalAlpha = 1;
    }

    function drawForegroundVignette() {
      let grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 100, canvas.width/2, canvas.height/2, 550);
      grad.addColorStop(0, 'rgba(5,6,10,0)');
      grad.addColorStop(0.8, 'rgba(8,10,18,0.5)');
      grad.addColorStop(1, 'rgba(12,15,25,0.9)');
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,canvas.width,canvas.height);
      
      // Línea de scan sutil
      ctx.fillStyle = 'rgba(100,130,200,0.03)';
      ctx.fillRect(0, (Date.now()*0.05)%canvas.height, canvas.width, 1);
    }

    function drawUI() {
      ctx.fillStyle = '#7a8baf';
      ctx.font = '600 13px "Segoe UI", system-ui';
      ctx.textAlign = 'left';
      ctx.fillText('FASE 2: MUNDO & VISUAL', 20, 30);
      
      ctx.fillStyle = '#4a5a7a';
      ctx.font = '12px monospace';
      ctx.fillText('A/D o ←/→: Mover  |  ESPACIO: Saltar', 20, 50);
      
      // Indicador de estado
      let state = player.grounded ? (Math.abs(player.vx)>1 ? 'CORRIENDO' : 'REPOSO') : (player.vy<0 ? 'SALTANDO' : 'CAYENDO');
      ctx.fillStyle = '#556688';
      ctx.fillText(`ESTADO: ${state} | CAM: ${Math.round(camera.x)}`, 20, 70);
    }

    /* =========================================
       🔄 GAME LOOP
       ========================================= */
    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    // 🚀 INICIO
    loop();
  </script>
</body>
</html>
