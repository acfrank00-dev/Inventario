<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hollow Mini - Fase 4: Pulido Final</title>
  <style>
    body {
      margin: 0; background: #020204; overflow: hidden;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif;
    }
    canvas {
      background: #08090f;
      box-shadow: 0 0 50px rgba(60, 80, 140, 0.3);
      border: 1px solid #151825;
      image-rendering: auto;
    }
    #instructions {
      position: absolute; bottom: 20px; color: #445566; font-size: 12px; pointer-events: none;
      text-align: center; opacity: 0.7;
    }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="450"></canvas>
  <div id="instructions">A/D: Mover | ESPACIO: Saltar | X: Atacar</div>

  <script>
    /* =========================================
       ⚙️ SETUP & CONSTANTES
       ========================================= */
    const cvs = document.getElementById('game');
    const ctx = cvs.getContext('2d');
    
    // Mundo
    const WORLD_W = 3200;
    const CAM_LERP = 0.06;
    const CAM_LOOK = 70;

    // Físicas
    const G = 0.55;
    const JUMP_F = -11.8;
    const SPD_MAX = 5.2;
    const ACC_G = 0.9;
    const ACC_A = 0.5;
    const FRIC = 0.84;
    const COYOTE = 7;
    const J_BUFFER = 8;

    // Combate
    const ATK_DUR = 14;
    const ATK_CD = 18;
    const ATK_KB = 7;
    const P_KB = 5;
    const I_FRAMES = 45;
    const HITSTOP = 5;
    
    // Estado
    let state = 'PLAY'; // PLAY, DYING, DEAD, FADE
    let hitStop = 0;
    let shake = { x: 0, y: 0, i: 0, d: 0.85 };
    let fadeAlpha = 0;
    let flashTimer = 0; // Para flash rojo de daño

    /* =========================================
       ⌨️ INPUT
       ========================================= */
    const keys = {};
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    /* =========================================
       🌍 NIVEL (AMPLIADO)
       ========================================= */
    const plats = [
      {x:0, y:380, w:500, h:40, t:'solid'}, {x:600, y:340, w:150, h:15, t:'oneway'},
      {x:850, y:280, w:100, h:15, t:'oneway'}, {x:1050, y:380, w:600, h:40, t:'solid'},
      {x:1250, y:260, w:80, h:15, t:'oneway'}, {x:1400, y:180, w:120, h:15, t:'oneway'},
      {x:1650, y:320, w:180, h:15, t:'oneway'}, {x:1900, y:380, w:800, h:40, t:'solid'},
      {x:2000, y:280, w:100, h:15, t:'oneway'}, {x:2200, y:200, w:150, h:15, t:'solid'},
      {x:2450, y:280, w:90, h:15, t:'oneway'}, {x:2600, y:180, w:200, h:20, t:'solid'},
      {x:450, y:410, w:600, h:10, t:'spike'}, {x:1750, y:370, w:150, h:10, t:'spike'},
      {x:2700, y:200, w:300, h:10, t:'spike'}
    ];
    const cp = {x: 1350, y: 340, w: 20, h: 40, act: false, c: false}; // c=checkpoint activated visual

    /* =========================================
       🌌 ENTIDADES (PLAYER, ENEMIGOS, PARTÍCULAS)
       ========================================= */
    let p = { x:100, y:300, w:22, h:30, vx:0, vy:0, g:false, f:1, 
              coyote:0, jbuf:0, hp:5, mhp:5, inv:0, flash:0, 
              atk:{a:false, t:0, cd:0, hit:false}, 
              resp:{x:100, y:300}, cape:[] };
    
    let enemies = [];
    let projs = [];
    let parts = [];

    function spawnE(type, x, y, hp) {
      enemies.push({
        x, y, w:26, h:22, vx:0, vy:0, f:1, st:'idle', t:60,
        hp, mhp:hp, type, range:150, sp:1.4, chSpd:4, inv:0, fl:0,
        dead:false, deathT:120, sx:x, sy:y, baseY:y, hov:0, shootT:0
      });
    }
    spawnE('p', 400, 350, 4); spawnE('t', 1100, 350, 3);
    spawnE('f', 1500, 200, 2); spawnE('p', 2000, 340, 5);
    spawnE('t', 2500, 150, 3);

    function part(x,y,n,c,s,g=0) {
      for(let i=0; i<n; i++) parts.push({
        x, y, vx:(Math.random()-.5)*s*2, vy:(Math.random()-.8)*s,
        l:20+Math.random()*20, ml:40, sz:1+Math.random()*3, c, g
      });
    }

    /* =========================================
       📷 CÁMARA SUAVE
       ========================================= */
    let cam = { x:0, y:0 };
    function updateCam() {
      let tx = p.x + p.w/2 - cvs.width/2 + (p.f * CAM_LOOK);
      let ty = p.y + p.h/2 - cvs.height/2 + 150;
      cam.x += (tx - cam.x) * CAM_LERP;
      cam.y += (ty - cam.y) * (CAM_LERP * 0.6);
      cam.x = Math.max(0, Math.min(cam.x, WORLD_W - cvs.width));
      cam.y = Math.max(-60, Math.min(cam.y, 180));
    }

    /* =========================================
       ⚙️ LÓGICA PRINCIPAL
       ========================================= */
    function update() {
      if (hitStop > 0) { hitStop--; return; }

      // --- ESTADOS DEL JUEGO ---
      if (state === 'DEAD') {
        if (keys['Space'] || keys['Enter'] || keys['KeyZ'] || keys['KeyX']) startRespawn();
        updateParts(); updateCam(); return;
      }
      if (state === 'DYING') {
        fadeAlpha += 0.04;
        updateParts(); updateCam();
        if (fadeAlpha >= 1) state = 'DEAD';
        return;
      }
      if (state === 'FADE') {
        fadeAlpha -= 0.05;
        updateParts(); updateCam();
        if (fadeAlpha <= 0) { state = 'PLAY'; fadeAlpha = 0; }
        return;
      }

      // --- JUGADOR ---
      if (p.inv > 0) p.inv--;
      if (p.atk.cd > 0) p.atk.cd--;

      let mov = false, acc = p.g ? ACC_G : ACC_A;
      if (keys['ArrowRight'] || keys['KeyD']) { p.vx += acc; p.f = 1; mov = true; }
      else if (keys['ArrowLeft'] || keys['KeyA']) { p.vx -= acc; p.f = -1; mov = true; }
      else p.vx *= FRIC;
      p.vx = Math.max(-SPD_MAX, Math.min(SPD_MAX, p.vx));

      if (p.g) p.coyote = COYOTE; else p.coyote--;
      if (keys['Space'] || keys['KeyW']) p.jbuf = J_BUFFER; else p.jbuf--;
      if (p.jbuf > 0 && p.coyote > 0) {
        p.vy = JUMP_F; p.g = false; p.coyote = p.jbuf = 0;
        p.stretch = -0.4; part(p.x+11, p.y+30, 6, '#8899cc', 1.2, 0);
      }
      if (!(keys['Space']||keys['KeyW']) && p.vy < -3) p.vy *= 0.72;

      if ((keys['KeyX'] || keys['KeyJ']) && p.atk.cd === 0 && !p.atk.a) {
        p.atk.a = true; p.atk.t = ATK_DUR; p.atk.cd = ATK_CD; p.atk.hit = false;
      }
      if (p.atk.a) { p.atk.t--; if(p.atk.t <= 0) p.atk.a = false; }

      p.vy += G;
      p.x += p.vx; colX(); p.g = false; p.y += p.vy; colY();

      if (p.g && p.vy > 4) { p.stretch = 0.35; part(p.x+11, p.y+30, 8, '#aabbdd', 1.5, 0); }
      
      // Checkpoint
      if (!cp.act && Math.abs(p.x-cp.x)<30 && Math.abs(p.y-cp.y)<40) {
        cp.act = true; p.resp = {x:cp.x, y:cp.y-40};
        part(cp.x+10, cp.y+10, 15, '#44ffaa', 2, 0);
      }
      if (p.y > 500) takeDmg(p.f * -P_KB, true); // Caída al vacío = muerte

      // Capa
      p.cape.unshift({x:p.x+11, y:p.y+10});
      if (p.cape.length > 14) p.cape.pop();
      p.cape.forEach((c,i) => c.y += 0.8 + i*0.15);

      // --- ENEMIGOS ---
      enemies.forEach(e => {
        if (e.dead) { e.deathT--; return; }
        if (e.inv > 0) e.inv--;
        
        let d = Math.hypot(p.x - e.x, p.y - e.y);
        if (e.st === 'idle') { e.t--; if(e.t<=0 || d < e.range) e.st = 'alert'; }
        if (e.st === 'alert') { e.t = 20; e.st = 'attack'; }
        
        if (e.st === 'attack') {
          if (e.type === 'p') e.vx = (p.x > e.x ? 1 : -1) * e.chSpd;
          else if (e.type === 'f') {
            let dx = p.x-e.x, dy = p.y-e.y, m = Math.hypot(dx,dy)||1;
            e.vx = (dx/m)*4; e.vy = (dy/m)*4;
            e.hov += 0.1; e.y = e.sy + Math.sin(e.hov)*30; // Flyer bobbing
          } else if (e.type === 't') {
            if (++e.shootT > 60) {
              e.shootT = 0;
              let dx=p.x-e.x, dy=p.y-e.y, m=Math.hypot(dx,dy)||1;
              projs.push({x:e.x+12, y:e.y+12, vx:(dx/m)*5, vy:(dy/m)*5, r:5, l:100, c:'#ff6644'});
              part(e.x+12, e.y+12, 6, '#ffaa33', 1.5, 0);
            }
          }
          e.t--; if(e.t<=0 || d>200) { e.st = 'idle'; e.t = 60; if(e.type!=='t') e.vx *= 0.5; }
        } else {
          e.vx = (e.type==='f' ? 0 : e.f * e.sp);
          e.vy = (e.type==='f' ? 0 : e.vy + G);
        }

        if (e.type !== 'f') { e.x += e.vx; eColX(e); e.y += e.vy; eColY(e); }
        
        // Daño contacto
        if (oLap(p, e) && p.inv === 0) takeDmg((p.x<e.x?-1:1)*P_KB, false);

        // Hitbox ataque
        if (p.atk.a && p.atk.t>4 && p.atk.t<12 && !p.atk.hit) {
          let ab = {x:p.f>0?p.x+p.w:p.x-35, y:p.y-5, w:35, h:p.h+10};
          if (oLap(ab, e)) {
            e.hp--; e.inv=30; e.fl=8; e.st='idle'; e.t=60;
            e.vx = p.f*ATK_KB; e.vy = -3;
            part(e.x+e.w/2, e.y+e.h/2, 12, '#ffaa33', 3, 0.15);
            hitStop = HITSTOP; shake.i = 4; p.atk.hit = true;
            if (e.hp <= 0) { 
              e.dead = true; e.deathT = 120; 
              part(e.x+e.w/2, e.y+e.h/2, 25, '#ff4455', 4, 0.1); 
            }
          }
        }
      });

      // --- PROYECTILES ---
      for(let i=projs.length-1; i>=0; i--) {
        let pr = projs[i]; pr.x+=pr.vx; pr.y+=pr.vy; pr.l--;
        if(pr.l<=0){projs.splice(i,1);continue;}
        if(oLap(p,{x:pr.x-pr.r,y:pr.y-pr.r,w:pr.r*2,h:pr.r*2}) && p.inv===0){
          takeDmg(pr.vx>0?-2:2, false); projs.splice(i,1);
        }
      }

      // --- PARTÍCULAS ---
      updateParts();
      updateCam();
    }

    /* =========================================
       💥 COLISIONES & COMBATE
       ========================================= */
    function oLap(a,b){return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;}
    function takeDmg(kb, isFall) {
      if (p.hp <= 0) return;
      p.hp--; p.inv = I_FRAMES; p.flash = 15; p.vx = kb; p.vy = isFall ? -5 : -4;
      shake.i = isFall ? 10 : 5; flashTimer = 8;
      part(p.x+11, p.y+15, 10, '#ff4444', 2, 0.1);
      if (p.hp <= 0) {
        state = 'DYING'; fadeAlpha = 0; shake.i = 15;
        part(p.x+11, p.y+15, 40, '#dce4f5', 5, 0.15); // Explosión de alma
      }
    }
    function startRespawn() {
      p.x = p.resp.x; p.y = p.resp.y; p.vx = p.vy = 0;
      p.hp = p.mhp; p.inv = 60; p.cape = [];
      enemies = []; // Respawn simple
      spawnE('p', 400, 350, 4); spawnE('t', 1100, 350, 3);
      spawnE('f', 1500, 200, 2); spawnE('p', 2000, 340, 5);
      spawnE('t', 2500, 150, 3);
      projs = [];
      state = 'FADE';
    }
    function updateParts() {
      for(let i=parts.length-1; i>=0; i--) {
        let p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.l--;
        if(p.l<=0) parts.splice(i,1);
      }
    }
    function colX(){
      for(let pl of plats){
        if(pl.t==='spike' && oLap(p,pl)){takeDmg(0,false);return;}
        if(p.x<pl.x+pl.w && p.x+p.w>pl.x && p.y+p.h>pl.y+4 && p.y<pl.y+pl.h-4){
          p.vx>0?p.x=pl.x-p.w:p.x=pl.x+pl.w; p.vx=0;
        }
      }
    }
    function colY(){
      for(let pl of plats){
        if(p.x+p.w>pl.x+2 && p.x<pl.x+pl.w-2){
          if(pl.t==='oneway'){ if(p.vy>=0 && p.y+p.h-p.vy<=pl.y+2){ p.y=pl.y-p.h; p.g=true; p.vy=0; }}
          else if(p.y+p.h>pl.y && p.y<pl.y+pl.h){
            p.vy>0?(p.y=pl.y-p.h, p.g=true, p.vy=0):(p.y=pl.y+pl.h, p.vy=0);
          }
        }
      }
    }
    function eColX(e){
      for(let pl of plats){
        if(e.x<pl.x+pl.w && e.x+e.w>pl.x && e.y+e.h>pl.y+5 && e.y<pl.y+pl.h-5){
          e.vx>0?e.x=pl.x-e.w:e.x=pl.x+pl.w; e.vx*=-0.3; e.f*=-1;
        }
      }
    }
    function eColY(e){
      for(let pl of plats){
        if(e.x+e.w>pl.x+3 && e.x<pl.x+pl.w-3){
          if(e.vy>0 && e.y+e.h>pl.y && e.y+e.h-e.vy<=pl.y+5){ e.y=pl.y-e.h; e.vy=0; }
          else if(e.vy<0){ e.y=pl.y+pl.h; e.vy=0; }
        }
      }
    }

    /* =========================================
       🖼️ RENDER
       ========================================= */
    function draw() {
      ctx.clearRect(0,0,cvs.width,cvs.height);
      
      // 1. Fondo (Parallax)
      ctx.fillStyle = '#0a0c14'; ctx.globalAlpha = 0.5;
      let ox1 = -cam.x * 0.1;
      for(let i=0;i<10;i++){
        let bx=ox1+i*200; ctx.beginPath(); ctx.moveTo(bx,cvs.height);
        ctx.quadraticCurveTo(bx+70,cvs.height-120,bx+140,cvs.height); ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Flash de daño rojo
      if(flashTimer > 0) {
        ctx.fillStyle = 'rgba(255,50,50,0.3)';
        ctx.fillRect(0,0,cvs.width,cvs.height);
        flashTimer--;
      }

      ctx.save(); ctx.translate(-cam.x+shake.x, -cam.y+shake.y);

      // 2. Plataformas
      plats.forEach(pl => {
        if(pl.t==='spike'){
          ctx.fillStyle='#3a2a35'; ctx.beginPath();
          for(let i=0;i<pl.w;i+=15){ctx.moveTo(pl.x+i, pl.y); ctx.lineTo(pl.x+i+7.5, pl.y-12); ctx.lineTo(pl.x+i+15, pl.y);}
          ctx.fill(); return;
        }
        ctx.fillStyle=pl.t==='solid'?'#141620':'#1a1d28';
        ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
        ctx.shadowBlur=6; ctx.shadowColor='#2a3555';
        ctx.fillStyle=pl.t==='solid'?'#222532':'#2a2e3d';
        ctx.fillRect(pl.x,pl.y,pl.w,3); ctx.shadowBlur=0;
        ctx.fillStyle='#0f1018'; ctx.fillRect(pl.x,pl.y+3,pl.w,pl.h-3);
      });

      // 3. Checkpoint
      ctx.fillStyle = cp.act ? '#44ffaa' : '#556677';
      ctx.shadowColor = cp.act ? '#44ffaa' : '#556677';
      ctx.shadowBlur = cp.act ? 15 : 5;
      ctx.fillRect(cp.x, cp.y, cp.w, cp.h);
      ctx.shadowBlur = 0;

      // 4. Enemigos
      enemies.forEach(e => {
        if(e.dead) {
           if(e.deathT > 0) {
             ctx.globalAlpha = e.deathT/120;
             ctx.fillStyle = '#ff4455'; ctx.beginPath(); ctx.arc(e.x+13, e.y+11, 10*(120-e.deathT)/20, 0, Math.PI*2); ctx.fill();
             ctx.globalAlpha = 1;
           }
           return; 
        }
        ctx.fillStyle = e.fl>0 ? '#ffffff' : (e.type==='p'?'#2a2535':e.type==='f'?'#253035':'#302525');
        ctx.shadowColor = e.fl>0 ? '#ffaa33' : '#ff4466'; ctx.shadowBlur = e.fl>0?15:5;
        ctx.beginPath(); e.type==='f'?ctx.arc(e.x+10,e.y+10,10,0,Math.PI*2):ctx.roundRect(e.x,e.y,e.w,e.h,5); ctx.fill();
        ctx.shadowBlur = 0;
        // Ojos
        ctx.fillStyle = '#ff5566'; let ex=e.f>0?e.x+e.w-8:e.x+3;
        ctx.fillRect(ex, e.y+8, 5, 6);
        // Turret disparando
        if(e.type==='t' && e.shootT>45){
          ctx.fillStyle='rgba(255,100,50,0.4)'; ctx.beginPath(); ctx.arc(e.x+12,e.y+12,15,0,Math.PI*2); ctx.fill();
        }
        // HP
        ctx.fillStyle='#442222'; ctx.fillRect(e.x, e.y-8, e.w, 4);
        ctx.fillStyle='#ff5566'; ctx.fillRect(e.x, e.y-8, (e.hp/e.mhp)*e.w, 4);
      });

      // 5. Proyectiles
      projs.forEach(pr => { ctx.fillStyle=pr.c; ctx.shadowColor=pr.c; ctx.shadowBlur=6; ctx.beginPath(); ctx.arc(pr.x,pr.y,pr.r,0,Math.PI*2); ctx.fill(); });
      ctx.shadowBlur = 0;

      // 6. Jugador
      if(p.inv===0 || Math.floor(Date.now()/50)%2===0){
        let ox=p.x - p.f*4, oy=p.y - 10 + p.stretch*5;
        // Flash daño
        if(p.flash>0){ctx.fillStyle='#fff'; ctx.shadowBlur=12; ctx.shadowColor='#ff3333'; p.flash--;}
        else{ctx.fillStyle='#dce4f5'; ctx.shadowBlur=10; ctx.shadowColor='#88aadd';}
        
        ctx.save(); ctx.translate(ox+p.w/2, oy+p.h/2); ctx.scale(1-Math.abs(p.stretch)*0.2, 1+p.stretch);
        ctx.beginPath(); ctx.roundRect(-p.w/2, -p.h/2, p.w, p.h, 6); ctx.fill();
        ctx.restore(); ctx.shadowBlur=0;

        // Ojos
        ctx.fillStyle='#080a12'; ctx.fillRect(ox+(p.f>0?p.w-9:5), oy+10+(p.vy<-2?-1:0), 6, 8);
        
        // Capa
        ctx.strokeStyle='#5a6a90'; ctx.lineWidth=3; ctx.lineCap='round';
        ctx.beginPath();
        for(let i=0;i<p.cape.length;i++){let c=p.cape[i]; let a=0.5-(i*0.035);ctx.globalAlpha=Math.max(0,a);if(i===0)ctx.moveTo(c.x-(p.f*6),c.y);else ctx.lineTo(c.x-(p.f*12)+Math.sin(Date.now()*0.01+i)*2,c.y);}
        ctx.stroke(); ctx.globalAlpha=1;

        // Espada
        if(p.atk.a && p.atk.t>3){
          let t=1-(p.atk.t/ATK_DUR), sc=1.2-Math.abs(t-0.5)*2;
          ctx.save(); ctx.translate(ox+p.w/2, oy+p.h/2); ctx.rotate(p.f>0?-0.3+t*1.2:Math.PI+0.3-t*1.2);
          ctx.scale(p.f*sc,sc); ctx.fillStyle=`rgba(200,220,255,${Math.sin(t*Math.PI)*0.8})`;
          ctx.shadowColor='#aaccff'; ctx.shadowBlur=10;
          ctx.beginPath(); ctx.arc(15,-10,28,-0.8,0.8); ctx.lineTo(15,-10); ctx.closePath(); ctx.fill(); ctx.restore();
        }
      }

      // 7. Partículas
      parts.forEach(p => { let a=p.l/p.ml; ctx.globalAlpha=a; ctx.fillStyle=p.c; ctx.shadowColor=p.c; ctx.shadowBlur=3; ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*a,0,Math.PI*2); ctx.fill(); });
      ctx.shadowBlur=0; ctx.globalAlpha=1;

      // Shake decay
      if(shake.i > 0.5) { shake.x=(Math.random()-.5)*shake.i; shake.y=(Math.random()-.5)*shake.i; shake.i*=shake.d; }
      else shake.x = shake.y = 0;

      ctx.restore();

      // --- UI ---
      // Máscaras de vida
      let mx=20, my=30;
      ctx.textAlign='left'; ctx.fillStyle='#7a8baf'; ctx.font='bold 13px system-ui';
      ctx.fillText('Máscaras', mx, my-10);
      for(let i=0;i<p.mhp;i++){ 
        ctx.beginPath(); ctx.arc(mx+i*22, my+10, 8, 0, Math.PI*2);
        ctx.fillStyle=i<p.hp?'#e8eef5':'#1a1d2a'; ctx.fill();
        if(i<p.hp){ctx.shadowColor='#88aadd';ctx.shadowBlur=6;ctx.fill();ctx.shadowBlur=0;}
        ctx.strokeStyle='#2a2d3a'; ctx.lineWidth=1; ctx.stroke();
      }
      ctx.fillStyle='#4a5a7a'; ctx.font='12px monospace'; ctx.fillText('Vida', mx, my+30);

      // --- OVERLAYS ---
      // Pantalla de Muerte
      if (state === 'DYING' || state === 'DEAD' || state === 'FADE') {
        ctx.fillStyle = `rgba(5, 2, 8, ${fadeAlpha})`;
        ctx.fillRect(0, 0, cvs.width, cvs.height);
        
        if (state === 'DEAD') {
          ctx.globalAlpha = Math.max(0, (1 - fadeAlpha)); // Fade in text
          ctx.fillStyle = '#a8b0c5'; ctx.font = '40px system-ui'; ctx.textAlign = 'center';
          ctx.shadowColor = '#ffffff'; ctx.shadowBlur = 20;
          ctx.fillText("ALMA ROTA", cvs.width/2, cvs.height/2 - 20);
          ctx.shadowBlur = 0;
          
          ctx.fillStyle = '#556677'; ctx.font = '14px monospace';
          ctx.fillText("Presiona ESPACIO o X para renacer", cvs.width/2, cvs.height/2 + 30);
          ctx.globalAlpha = 1;
        }
      }
    }

    /* =========================================
       🔄 GAME LOOP
       ========================================= */
    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
  </script>
</body>
