<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Hollow Knight - Fase 1</title>
  <style>
    /* =========================================
       🎨 CSS / ESTILO GLOBAL
       ========================================= */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #08080c;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    canvas {
      border: 2px solid #1a1a24;
      box-shadow: 0 0 30px rgba(80, 110, 180, 0.15);
      background: #11111a;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="450"></canvas>

  <script>
    /* =========================================
       ⚙️ CONFIGURACIÓN INICIAL
       ========================================= */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Constantes de diseño
    const GRAVITY = 0.6;
    const FALL_GRAVITY = 0.95;
    const JUMP_FORCE = -11.5;
    const GROUND_ACCEL = 0.8;
    const AIR_ACCEL = 0.45;
    const FRICTION = 0.82;
    const MAX_SPEED = 5.5;
    const COYOTE_TIME = 6;      // Frames de gracia tras caer de una plataforma
    const JUMP_BUFFER = 6;      // Frames de anticipación al saltar

    /* =========================================
       ⌨️ INPUT
       ========================================= */
    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    /* =========================================
       👤 PLAYER
       ========================================= */
    const player = {
      x: 200, y: 300,
      w: 20, h: 28,
      vx: 0, vy: 0,
      grounded: false,
      facing: 1, // 1 derecha, -1 izquierda
      coyoteTimer: 0,
      jumpBufferTimer: 0,
      // Estética
      cape: [],
      squash: 0,
      glowIntensity: 0
    };

    /* =========================================
       🌍 PLATAFORMAS / MUNDO
       ========================================= */
    // Nivel simple para probar movimiento y colisiones
    const platforms = [
      { x: 0, y: 400, w: 800, h: 50 },      // Suelo principal
      { x: 250, y: 340, w: 120, h: 15 },     // Plataforma baja
      { x: 450, y: 270, w: 100, h: 15 },     // Plataforma media
      { x: 600, y: 200, w: 150, h: 15 },     // Plataforma alta
      { x: 50, y: 280, w: 80, h: 15 }        // Plataforma izquierda
    ];

    /* =========================================
       📷 CAMERA
       ========================================= */
    const camera = { x: 0, y: 0, lerp: 0.06 };

    /* =========================================
       🌌 PARTÍCULAS
       ========================================= */
    const particles = [];
    function spawnParticles(x, y, count, color, speed = 2) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * speed * 2,
          vy: (Math.random() - 0.5) * speed * 2 - 1,
          life: 30 + Math.random() * 20,
          maxLife: 30 + Math.random() * 20,
          size: 1.5 + Math.random() * 2,
          color
        });
      }
    }

    /* =========================================
       ⚙️ PHYSICS & ACTUALIZACIÓN
       ========================================= */
    function update() {
      // 1. Coyote Time & Jump Buffer
      if (player.grounded) player.coyoteTimer = COYOTE_TIME;
      else player.coyoteTimer--;
      
      if (keys['Space']) player.jumpBufferTimer = JUMP_BUFFER;
      else player.jumpBufferTimer--;

      // 2. Salto
      if (player.jumpBufferTimer > 0 && player.coyoteTimer > 0) {
        player.vy = JUMP_FORCE;
        player.grounded = false;
        player.coyoteTimer = 0;
        player.jumpBufferTimer = 0;
        player.squash = -0.3; // Efecto visual al despegar
        spawnParticles(player.x + player.w/2, player.y + player.h, 5, '#ffffff', 1.5);
      }

      // Variable jump height (soltar espacio reduce velocidad vertical)
      if (!keys['Space'] && player.vy < -3) {
        player.vy *= 0.75;
      }

      // 3. Movimiento Horizontal
      let accel = player.grounded ? GROUND_ACCEL : AIR_ACCEL;
      if (keys['ArrowRight'] || keys['KeyD']) {
        player.vx += accel;
        player.facing = 1;
      } else if (keys['ArrowLeft'] || keys['KeyA']) {
        player.vx -= accel;
        player.facing = -1;
      } else {
        player.vx *= FRICTION;
      }
      player.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, player.vx));

      // Partículas al correr
      if (Math.abs(player.vx) > 3 && player.grounded && Math.random() > 0.7) {
        spawnParticles(player.x + player.w/2, player.y + player.h, 1, '#8899cc', 0.8);
      }

      // 4. Gravedad
      player.vy += (player.vy > 0 ? FALL_GRAVITY : GRAVITY);

      // 5. Colisiones Eje X
      player.x += player.vx;
      resolveCollisions('x');

      // 6. Colisiones Eje Y
      player.y += player.vy;
      player.grounded = false;
      resolveCollisions('y');

      // Efecto squash/stretch al aterrizar
      if (player.grounded && player.squash < 0) {
        player.squash = 0.25;
        spawnParticles(player.x + player.w/2, player.y + player.h, 8, '#ffffff', 1);
      }
      player.squash *= 0.85;

      // 7. Actualizar Capa (Cape Trail)
      player.cape.unshift({ x: player.x + player.w/2, y: player.y + player.h/2 });
      if (player.cape.length > 12) player.cape.pop();
      for (let p of player.cape) p.y += 1.5; // Efecto de gravedad en la capa

      // 8. Cámara Suave
      let targetX = player.x + player.w/2 - canvas.width/2 + (player.facing * 40);
      let targetY = player.y + player.h/2 - canvas.height/2 + 30;
      camera.x += (targetX - camera.x) * camera.lerp;
      camera.y += (targetY - camera.y) * camera.lerp;
      
      // Limites de cámara (opcional, para demo se deja libre)
      camera.x = Math.max(0, Math.min(camera.x, 800 - canvas.width));
      camera.y = Math.max(0, Math.min(camera.y, 450 - canvas.height));
    }

    function resolveCollisions(axis) {
      for (let plat of platforms) {
        if (player.x < plat.x + plat.w &&
            player.x + player.w > plat.x &&
            player.y < plat.y + plat.h &&
            player.y + player.h > plat.y) {
          
          if (axis === 'x') {
            if (player.vx > 0) player.x = plat.x - player.w;
            else player.x = plat.x + plat.w;
            player.vx = 0;
          } else {
            if (player.vy > 0) {
              player.y = plat.y - player.h;
              player.grounded = true;
              player.vy = 0;
            } else {
              player.y = plat.y + plat.h;
              player.vy = 0;
            }
          }
        }
      }
    }

    /* =========================================
       🖼️ RENDER
       ========================================= */
    function render() {
      // Limpiar
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(-camera.x, -camera.y);

      // Fondo atmosférico simple
      let grad = ctx.createLinearGradient(camera.x, camera.y, camera.x, camera.y + canvas.height);
      grad.addColorStop(0, '#0a0a12');
      grad.addColorStop(1, '#151522');
      ctx.fillStyle = grad;
      ctx.fillRect(camera.x, camera.y, canvas.width, canvas.height);

      // Dibujar Plataformas
      ctx.shadowBlur = 0;
      for (let p of platforms) {
        ctx.fillStyle = '#1a1a24';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        // Borde superior iluminado
        ctx.fillStyle = '#2a2a3a';
        ctx.fillRect(p.x, p.y, p.w, 3);
        ctx.fillStyle = '#11111a'; // Sombra interna
        ctx.fillRect(p.x, p.y + 3, p.w, p.h - 3);
      }

      // Dibujar Partículas
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        
        let alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Dibujar Jugador
      drawPlayer();

      ctx.restore();

      // UI Minimalista (Fase 1)
      ctx.fillStyle = '#8899cc';
      ctx.font = '12px monospace';
      ctx.fillText('FASE 1: MOVIMIENTO & BASE', 15, 25);
      ctx.fillStyle = '#4a5a88';
      ctx.fillText('A/D o ←/→: Mover  |  ESPACIO: Saltar', 15, 45);
    }

    function drawPlayer() {
      let px = player.x, py = player.y;
      let scale = 1 + player.squash;
      let drawW = player.w / scale;
      let drawH = player.h * scale;
      let offsetX = (player.w - drawW) / 2;
      let offsetY = player.h - drawH;

      // Glow base
      ctx.shadowColor = '#aaccff';
      ctx.shadowBlur = 12 + Math.sin(Date.now() * 0.005) * 3;
      
      // Cuerpo
      ctx.fillStyle = '#e8eef5';
      ctx.fillRect(px + offsetX, py + offsetY, drawW, drawH);
      ctx.shadowBlur = 0;

      // Ojos (estética Hollow Knight)
      ctx.fillStyle = '#0a0a12';
      let eyeX = player.facing > 0 ? px + 4 : px + player.w - 9;
      ctx.fillRect(eyeX, py + offsetY + 6, 5, 7);

      // Capa (Trail)
      ctx.strokeStyle = '#6677aa';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      for (let i = 0; i < player.cape.length; i++) {
        let p = player.cape[i];
        let alpha = 1 - (i / player.cape.length);
        ctx.globalAlpha = alpha * 0.6;
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    /* =========================================
       🔄 GAME LOOP
       ========================================= */
    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    // 🚀 INICIO
    loop();
  </script>
</body>
</html>
